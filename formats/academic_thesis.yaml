# 学术论文格式（参考 GB/T 7714 及高校通用规范）
# 适用：毕业论文、学位论文、期刊投稿初稿

name: "学术论文（高校通用）"

page:
  top_cm: 2.5
  bottom_cm: 2.5
  left_cm: 3.0
  right_cm: 2.5
  page_size: A4

fonts:
  # 论文大标题（封面）
  cover_title:
    name: "黑体"
    size_pt: 18      # 小二
    bold: true
    align: center

  # 章标题 第一章 / 一、
  heading1:
    name: "黑体"
    size_pt: 15      # 小三
    bold: true
    align: center

  # 节标题 1.1 / （一）
  heading2:
    name: "黑体"
    size_pt: 14      # 四号
    bold: true
    align: left

  # 小节标题 1.1.1
  heading3:
    name: "黑体"
    size_pt: 12      # 小四
    bold: true
    align: left

  # 正文
  body:
    name: "宋体"
    size_pt: 12      # 小四
    bold: false
    align: justify

  # 摘要、关键词
  abstract:
    name: "宋体"
    size_pt: 12
    bold: false
    align: justify

  # 英文摘要
  abstract_en:
    name: "Times New Roman"
    size_pt: 12
    bold: false
    align: justify

  # 参考文献条目
  reference:
    name: "宋体"
    size_pt: 10.5    # 五号
    bold: false
    align: left

  # 图注 / 表注
  caption:
    name: "宋体"
    size_pt: 10.5
    bold: false
    align: center

  header:
    name: "宋体"
    size_pt: 10.5
    bold: false

  footer:
    name: "宋体"
    size_pt: 10.5
    bold: false

paragraph:
  line_spacing_pt: 22      # 约 1.5 倍行距（小四字体）
  first_line_indent_chars: 2
  space_before_pt: 0
  space_after_pt: 6        # 段后留少量间距

structure:
  levels:
    - "第一章"    # 也支持 "一、" 写法，由用户选择
    - "1.1"
    - "1.1.1"
    - "1.1.1.1"

page_number:
  format: "{n}"
  odd_align: center
  even_align: center
